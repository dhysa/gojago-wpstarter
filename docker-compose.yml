services:
  db:
    image: mariadb:11
    container_name: ${PROJECT_NAME}_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:latest
    container_name: ${PROJECT_NAME}_wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ENVIRONMENT_TYPE', getenv('WP_ENVIRONMENT_TYPE') ?: 'local');
        define('GOJAGO_GA_MEASUREMENT_ID', getenv('GOJAGO_GA_MEASUREMENT_ID') ?: '');
        define('GOJAGO_GTM_CONTAINER_ID', getenv('GOJAGO_GTM_CONTAINER_ID') ?: '');
        define('GOJAGO_LOGIN_SLUG', getenv('GOJAGO_LOGIN_SLUG') ?: 'managesite');
        define('DISALLOW_FILE_EDIT', true);
    volumes:
      - ./wordpress:/var/www/html
      - ./wp-content/themes/gojago-starter:/var/www/html/wp-content/themes/gojago-starter
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./plugins:/project-plugins:ro
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${PROJECT_NAME}_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 0

  wpcli:
    image: wordpress:cli
    container_name: ${PROJECT_NAME}_wpcli
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_SITE_URL: ${WORDPRESS_SITE_URL}
      WORDPRESS_SITE_TITLE: ${WORDPRESS_SITE_TITLE}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE}
      GOJAGO_GA_MEASUREMENT_ID: ${GOJAGO_GA_MEASUREMENT_ID}
      GOJAGO_GTM_CONTAINER_ID: ${GOJAGO_GTM_CONTAINER_ID}
      GOJAGO_LOGIN_SLUG: ${GOJAGO_LOGIN_SLUG}
      ACF_PRO_LICENSE_KEY: ${ACF_PRO_LICENSE_KEY}
      GRAVITY_FORMS_LICENSE_KEY: ${GRAVITY_FORMS_LICENSE_KEY}
    volumes:
      - ./wordpress:/var/www/html
      - ./wp-content/themes/gojago-starter:/var/www/html/wp-content/themes/gojago-starter
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./plugins:/project-plugins:ro
    command: >
      sh -c '
        until wp db check --path=/var/www/html >/dev/null 2>&1; do sleep 3; done;
        if ! wp core is-installed --path=/var/www/html >/dev/null 2>&1; then
          wp core install --path=/var/www/html --url="$${WORDPRESS_SITE_URL}" --title="$${WORDPRESS_SITE_TITLE}" --admin_user="$${WORDPRESS_ADMIN_USER}" --admin_password="$${WORDPRESS_ADMIN_PASSWORD}" --admin_email="$${WORDPRESS_ADMIN_EMAIL}" --skip-email;
        fi;
        wp core update --path=/var/www/html || true;
        find_plugin_zip() {
          plugin_file="$$1";
          shift;
          match="";
          for zip in $$(find /project-plugins -maxdepth 1 -type f -name "*.zip" 2>/dev/null | sort -V); do
            [ -f "$$zip" ] || continue;
            for hint in "$$@"; do
              echo "$$zip" | grep -Eiq "$$hint" && match="$$zip";
            done;
            unzip -l "$$zip" 2>/dev/null | grep -Eq "$$plugin_file" && match="$$zip";
          done;
          [ -n "$$match" ] && { printf "%s" "$$match"; return 0; };
          return 1;
        };
        seed_clean_homepage() {
          home_id="$$(wp option get page_on_front --path=/var/www/html 2>/dev/null || true)";
          if [ -z "$$home_id" ] || [ "$$home_id" = "0" ]; then
            home_id="$$(wp post create --post_type=page --post_status=publish --post_title="Home" --porcelain --path=/var/www/html)";
          fi;
          wp post update "$$home_id" --post_title="Home" --post_content="<!-- wp:group {\"align\":\"full\",\"className\":\"section\",\"style\":{\"spacing\":{\"padding\":{\"top\":\"var:preset|spacing|80\",\"right\":\"var:preset|spacing|40\",\"bottom\":\"var:preset|spacing|80\",\"left\":\"var:preset|spacing|40\"}}},\"backgroundColor\":\"base\",\"layout\":{\"type\":\"constrained\"}} --><div class=\"wp-block-group alignfull section has-base-background-color has-background\" style=\"padding-top:var(--wp--preset--spacing--80);padding-right:var(--wp--preset--spacing--40);padding-bottom:var(--wp--preset--spacing--80);padding-left:var(--wp--preset--spacing--40)\"><!-- wp:group {\"align\":\"wide\",\"className\":\"section-readable\",\"layout\":{\"type\":\"default\"}} --><div class=\"wp-block-group alignwide section-readable\"><!-- wp:heading {\"level\":1,\"fontSize\":\"heading-1\"} --><h1 class=\"wp-block-heading has-heading-1-font-size\">Clean WordPress starter for client projects.</h1><!-- /wp:heading --><!-- wp:paragraph {\"fontSize\":\"lead\"} --><p class=\"has-lead-font-size\">A neutral, editor-first baseline with editable blocks, clean spacing, and production-ready setup defaults.</p><!-- /wp:paragraph --><!-- wp:buttons --><div class=\"wp-block-buttons\"><!-- wp:button --><div class=\"wp-block-button\"><a class=\"wp-block-button__link wp-element-button\" href=\"/managesite\">Open admin</a></div><!-- /wp:button --></div><!-- /wp:buttons --></div><!-- /wp:group --></div><!-- /wp:group -->" --path=/var/www/html || true;
          wp option update show_on_front page --path=/var/www/html;
          wp option update page_on_front "$$home_id" --path=/var/www/html;
        };
        install_zip_plugin_if_available() {
          slug="$$1";
          plugin_file="$$2";
          shift 2;
          if zip="$$(find_plugin_zip "$$plugin_file" "$$@")"; then
            wp plugin install "$$zip" --force --activate --path=/var/www/html || true;
            wp plugin update "$$slug" --path=/var/www/html || true;
            wp plugin activate "$$slug" --path=/var/www/html || true;
          elif wp plugin is-installed "$$slug" --path=/var/www/html >/dev/null 2>&1; then
            wp plugin update "$$slug" --path=/var/www/html || true;
            wp plugin activate "$$slug" --path=/var/www/html || true;
          fi;
        };
        wp theme activate gojago-starter --path=/var/www/html;
        wp eval "if ( function_exists( '\''gojago_starter_seed_content'\'' ) ) { gojago_starter_seed_content(); }" --path=/var/www/html || true;
        wp plugin install all-in-one-wp-migration --force --activate --path=/var/www/html || true;
        wp plugin update all-in-one-wp-migration --path=/var/www/html || true;
        install_zip_plugin_if_available wp-cerber wp-cerber/wp-cerber.php wp-cerber cerber;
        install_zip_plugin_if_available advanced-custom-fields-pro advanced-custom-fields-pro/acf.php acf-pro advanced-custom-fields-pro;
        install_zip_plugin_if_available gravityforms gravityforms/gravityforms.php gravityforms gravity-forms;
        wp plugin delete hello akismet --path=/var/www/html || true;
        wp theme delete twentytwentysix twentytwentyfive twentytwentyfour twentytwentythree twentytwentytwo --path=/var/www/html || true;
        wp post delete 1 2 --force --path=/var/www/html || true;
        seed_clean_homepage;
        wp rewrite structure "/%postname%/" --path=/var/www/html;
        wp rewrite flush --hard --path=/var/www/html;
        wp option update blogdescription "Editor-first WordPress starter for client projects." --path=/var/www/html;
        wp cache flush --path=/var/www/html;
        tail -f /dev/null
      '

volumes:
  db_data:
